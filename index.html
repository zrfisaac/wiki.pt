<!DOCTYPE html>
<html lang="pt">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
		<title>ZRFISAAC</title>
		<meta name="description" content="An awesome docsify site for publishing some content on the web.">
		<link rel="stylesheet" href="library/vue/vue.css">
		<link  rel="stylesheet" href="library/docsify/plugins/darklight.style.min.css" title="docsify-darklight-theme" type="text/css" />
		<link rel="stylesheet" href="library/fontawesome/css/all.min.css">
	</head>
	<body>
		<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
			<div class="container">
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item">
							<a class="nav-link" href="/pt/"><i class="fa-solid fa-house"></i> Home</a>
						</li>
						<li class="nav-item">
							<a class="nav-link active" href="/wiki.pt/"><i class="fa-solid fa-book"></i> WIKI</a>
						</li>
					</ul>
				</div>
			</div>
		</nav>
		<div id="app"></div>
		<script>
			window.$docsify = {
				name: 'ZRFISAAC',
				auto2top: true,
				loadSidebar: true,
				maxLevel: 0,
				subMaxLevel: 3,
				search: {
					placeholder: 'Type to search',
					noData: 'No matches found.',
					depth: 2,
				},
				darklightTheme: {
					defaultTheme : 'dark',
				}
			};
		</script>
		<script src="library/docsify/docsify.min.js"></script>
		<script src="library/docsify/plugins/zoom-image.min.js"></script>
		<script src="library/docsify/plugins/search.js"></script>
		<script src="library/docsify/plugins/docsify-darklight-theme.js" type="text/javascript"></script>
		<script src="library/katex/katex.min.js"></script>
		<link rel="stylesheet" href="library/katex/katex.min.css" />
		<script src="library/docsify/plugins/docsify-latex.js"></script>
		<script type="module">
			import mermaid from "library/mermaid/mermaid.esm.min.mjs";
			mermaid.initialize({ startOnLoad: true });
			window.mermaid = mermaid;
		</script>
		<script src="library/docsify/plugins/docsify-mermaid.js"></script>
	</body>
</html>
